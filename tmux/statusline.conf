set -g @bg "#ffffff"
set -g @fg "#000000"
set -g @md "#808080"
set -g @cur "#377e22"
set -g @bak "#808080"
set -g @r "#377e22"

# vim: ft=tmux
set -g mode-style "fg=#{@bg},bg=#{@fg}"

set -g pane-border-style "fg=#{@md},bg=default"
set -g pane-active-border-style "fg=#{@fg},bg=default"

set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#{@bg},bg=#{@fg}" # restart to take this effect

setw -g window-status-separator " "

setw -g window-status-format "#[fg=#{@bak},bg=#{@fg}]#[fg=#{@fg},bg=#{@bak}]#I|#[fg=#{@fg},bg=#{@md}]#{b:pane_current_path}#[fg=#{@md},bg=#{@fg},nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#{@cur},bg=#{@fg}]#[fg=#{@bg},bg=#{@cur}]#I|#{b:pane_current_path}#[fg=#{@cur},bg=#{@fg}]"








set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left ""
# set -g status-left "#[fg=#535965,bg=#30363f] Mac "
# set -g status-right ""
set -g status-right "#[fg=#{@r},bg=#{@fg}]#[fg=#{@bg},bg=#{@r}]#h " # "#(whoami)@#h" 

# Set the max length of left and right blocks.
# set -g status-left-length "100"
# set -g status-right-length "100"

# Here I do not know what messages and activities are.
set -g message-style "fg=#{@fg},bg=#{@bg}"
set -g message-command-style "fg=#{@fg},bg=#{@bg}"
setw -g window-status-style "NONE,fg=#{@bg},bg=#{@fg}"
setw -g window-status-activity-style "underscore,fg=#{@bg},bg=#{@fg}"
