# Makes tmux clipboard compatible to mac system clipboard.
set-option -g default-command "which reattach-to-user-namespace > /dev/null && reattach-to-user-namespace -l $SHELL || $SHELL"

# Set the justify of status line.
set-option -g status-justify "left"

# Vi mode window movement.
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Scroll to watch histories.
set -g mouse on

# Split with 30 width horizontally.
bind | split-window -h -p 30

# Light mode.
# set -g window-style fg=#c5c7c5,bg=default
# set -g window-active-style fg=#333333,bg=default

# Dark mode.
# set -g window-style fg=#8e868b,bg=default
# set -g window-active-style fg=#acb2bf,bg=default
# set -g window-style fg=#5d6370,bg=default
# set -g window-active-style fg=#acb2bf,bg=default

# Start with fish by default.
set-option -g default-shell /opt/homebrew/bin/fish
set -g default-command /opt/homebrew/bin/fish
